slot    = "service"
version = "v1"
title   = "Service orchestration"

# Always-present environment variables set by winter on every dispatch,
# regardless of action. These four form the winter base extension contract:
# workspace context, extension identity, and writable config location.
# Source of truth: core/extension_invocation.py::build_extension_env.
[[env_var]]
name        = "WINTER_WORKSPACE_DIR"
description = "Absolute path to the workspace root."

[[env_var]]
name        = "WINTER_EXT_DIR"
description = "Absolute path to this orchestrator extension's clone (the dir containing winter-ext.toml)."

[[env_var]]
name        = "WINTER_EXT_PREFIX"
description = "The resolved symlink prefix for this extension."

[[env_var]]
name        = "WINTER_EXT_CONFIG_DIR"
description = "Absolute path to this extension's writable config/asset directory (default `.winter/config/<repo-name>/`); the writable counterpart to the read-only `WINTER_EXT_DIR`."

# Exit-code conventions for the service capability.
[[exit_code]]
code    = 0
meaning = "Success."

[[exit_code]]
code    = 2
meaning = "Unknown or unsupported action — the orchestrator does not recognise the action word."

[[exit_code]]
code    = 3
meaning = "Recognized-but-unimplemented action — the orchestrator knows the action but refuses to execute it (refuse-all stub)."

# Pass-through: for any other exit code the orchestrator's exit code becomes
# winter's exit code unmodified.

# Actions the orchestrator entrypoint must implement.
# Invocation form: <entrypoint> <action> [positionals...]
#   single-env:       <entrypoint> <action> <env>
#   patterns-optional: <entrypoint> <action> [<env>/<service>...]
#   patterns-required: <entrypoint> <action> <env>/<service> [<env>/<service>...]

[[action]]
name    = "up"
arity   = "single-env"
summary = "Start all services in the named feature environment."

[[action]]
name    = "down"
arity   = "single-env"
summary = "Stop all services in the named feature environment."

[[action]]
name    = "status"
arity   = "patterns-optional"
summary = "Report the running state of matched services (defaults to all envs/services)."

[[action]]
name    = "restart"
arity   = "patterns-required"
summary = "Restart one or more matched services without bringing down unmatched ones."

[[action]]
name    = "logs"
arity   = "patterns-required"
summary = "Stream or emit the log backlog for matched services as NDJSON on stdout."

# The logs render options ride on argv as CLI flags appended after the
# positional <env>/<service> patterns (NOT environment variables):
#   <entrypoint> logs <pattern...> [-f|--follow] [-n|--tail <N|all>] \
#     [--since <rfc3339>] [--until <rfc3339>] [-t|--timestamps]
# Rules (source of truth: modules/service/service_logs_service.py::_stream_single):
#   --tail        always emitted, carrying the resolved count string (N or all).
#   --since/--until carry pre-normalised RFC3339 timestamps; omitted when empty.
#   --follow/--timestamps emitted as bare flags only when true.
# Only the four always-present WINTER_* base vars above are set on a logs dispatch.

[[action]]
name    = "describe"
arity   = "no-positionals"
summary = "Emit a JSON object listing the service names owned by this provider."

# Returns a single JSON object on stdout: {"services": ["name", ...]}
# Unknown or empty → {"services": []} (an empty list is valid; missing key treated as empty).
# Always-present WINTER_* env vars are set by winter on every dispatch.
#
# Ownership contract:
#   Called ONLY when two or more providers are bound (explicit list or implicit-all).
#   Single-provider workspaces are never asked to describe (single-provider short-circuit).
#   Each service name must appear in exactly one provider's describe output — winter
#   raises DuplicateOwnershipError if two providers claim the same service.
#   An empty services list is valid: the provider declares it owns no named services.

[[action]]
name    = "catalog"
arity   = "no-positionals"
summary = "Emit scope-qualified service names declared by this provider as JSON."

# Returns a single JSON object on stdout:
#   {"services": ["workspace/<name>", "*/<name>", ...]}
#
# Scope prefixes:
#   "workspace/<name>" — the service runs in the shared workspace scope (matches
#                        "workspace/<name>" references in provision manifests).
#   "*/<name>"         — the service runs per feature env (matches "<any-env>/<name>"
#                        references in provision manifests, where env != "workspace").
#
# Winter invokes catalog for EACH bound provider when running `winter lint` to
# build the merged service catalog used by the required-services check.  A provider
# that does not implement catalog returns exit 2 or 3; winter's ServiceCatalogService
# silently omits that provider's names from the catalog, which causes required_services
# references to "fail: unknown service" findings even when the service is real.
# Therefore: IMPLEMENT catalog on every provider that declares services.
#
# Unknown or empty → {"services": []}
# Missing or non-list "services" key treated as empty (shape-stability).

# Conformance checks. These drive winter ext verify (phase 2).
[[check]]
kind        = "accepts-action"
description = "The entrypoint exits with any code other than 2 for each declared action word (exit 2 = unknown-action signal; exit 0 or exit 3 pass)."

[[check]]
kind        = "refuses-unknown"
description = "The entrypoint exits non-zero for an action word not in the declared action set (exit 2 or exit 3 are both accepted)."

[[check]]
kind        = "forwards-params"
description = "The entrypoint echoes its argv back on stdout or stderr (confirming argv is forwarded). WINTER_* env vars are set on every dispatch but are not asserted by this check."

[[check]]
kind        = "emits-describe-json"
description = "The entrypoint emits parseable {\"services\": [...]} JSON on stdout for the describe action. A provider whose describe output cannot be parsed would fail at runtime with a DescribeParseError when two or more providers are bound."
